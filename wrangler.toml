main = ".open-next/worker.js"
name = "fx-demo"
compatibility_date = "2025-08-15"
compatibility_flags = [
  # Enable Node.js API
  # https://developers.cloudflare.com/workers/configuration/compatibility-flags/#nodejs-compatibility-flag
  "nodejs_compat",
  # Allow the app to fetch public URLs
  # https://developers.cloudflare.com/workers/configuration/compatibility-flags/#global-fetch-strictly-public
  "global_fetch_strictly_public",
]

# Production custom domain. Requires `napochaan.com` to be an active zone in the
# same Cloudflare account; Cloudflare auto-provisions the DNS record and TLS cert.
# https://developers.cloudflare.com/workers/configuration/routing/custom-domains/
[[routes]]
pattern = "fx-demo.napochaan.com"
custom_domain = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"
